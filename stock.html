<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
      --primary: #A91D3A; 
      --dark: #2D3133; 
      --bg: #F3F4F6; 
      --card-bg: #FFFFFF; 
      --green: #22c55e;
      --blue: #3498db;
    }
    
    body { 
      font-family: 'Sarabun', sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding-bottom: 50px; 
    }
    
    /* ✅ เพิ่ม CSS ส่วน Login Overlay ให้เหมือนหน้า Manager */
    #login-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
      z-index: 9999; display: flex; align-items: center; justify-content: center; 
    }
    .login-box { 
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
      padding: 60px 40px; border-radius: 40px; width: 90%; max-width: 420px; text-align: center; 
      border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 40px 100px rgba(0,0,0,0.5); 
    }
    .login-input { 
      width: 100%; padding: 22px; border: 2px solid #EEE; border-radius: 20px; 
      margin-bottom: 30px; text-align: center; font-size: 28px; outline: none; box-sizing: border-box; 
    }
    #main-app { display: none; }

    .nav { 
      background: var(--card-bg); 
      padding: 10px 20px; 
      box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 100; 
    }
    
    .brand { 
      font-family: 'Prompt'; 
      font-weight: 600; 
      font-size: 16px; 
      color: var(--dark); 
      display: flex; 
      align-items: center; 
      gap: 10px; 
    }
    
    .container { 
      max-width: 600px; 
      margin: 15px auto; 
      padding: 0 15px; 
    }

    .search-box {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 10px 15px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #EEE;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }
    .search-input {
      border: none;
      outline: none;
      width: 100%;
      font-family: 'Prompt';
      font-size: 14px;
      color: var(--dark);
    }
    
    .task-card { 
      background: var(--card-bg); 
      border-radius: 15px; 
      padding: 15px; 
      margin-bottom: 15px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
      border-left: 6px solid var(--primary); 
      transition: all 0.3s; 
      position: relative; 
      animation: slideIn 0.4s ease-out;
    }
    
    .task-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-start; 
      margin-bottom: 10px; 
      border-bottom: 1px solid #F0F0F0; 
      padding-bottom: 8px; 
    }
    
    .order-id { 
      font-family: 'Prompt'; 
      font-weight: bold; 
      font-size: 18px; 
      color: var(--primary); 
    }
    
    .task-time { 
      font-size: 11px; 
      color: #666; 
      background: #F8F9FA; 
      padding: 4px 8px; 
      border-radius: 50px; 
      font-weight: 600;
      border: 1px solid #EEE;
    }
    
    .badge-container { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    .branch-badge { background: var(--dark); color: #FFF; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; }
    .phone-badge { background: var(--blue); color: #FFF; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-decoration: none; }
    
    .item-checklist { background: #FFF5F7; padding: 12px; border-radius: 12px; border: 1px dashed #FFD1DC; margin-top: 10px; }
    .check-row { display: flex; align-items: center; padding: 8px; background: #FFF; border-radius: 10px; margin-bottom: 6px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
    .check-row:hover { border-color: var(--primary); }
    .check-row input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; accent-color: var(--primary); }
    .check-row span { font-family: 'Prompt'; font-size: 14px; color: #444; }
    .check-row.checked { background: #F9FAFB; opacity: 0.6; }
    .check-row.checked span { text-decoration: line-through; }
    
    .action-btn { width: 100%; margin-top: 15px; padding: 12px; border: none; border-radius: 12px; background: var(--primary); color: #FFF; font-family: 'Prompt'; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
    .action-btn:disabled { background: #CCC; cursor: not-allowed; }
    
    .pagination-footer { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; font-size: 13px; padding: 15px; background: #FFF; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
    .page-btn { background: #F3F4F6; border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .page-btn:hover:not(:disabled) { background: var(--primary); color: white; }
    .styled-select { background: #FFF; border: 1px solid #DDD; padding: 5px 10px; border-radius: 8px; font-family: 'Prompt'; outline: none; cursor: pointer; font-size: 12px; }

    .empty-state { text-align: center; padding: 60px 20px; color: #AAA; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 50% { opacity: 0.5; } }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <i class="fas fa-tasks" style="font-size:60px; color:var(--primary); margin-bottom:20px;"></i>
    <h2 style="margin-bottom:10px; font-family:'Prompt'; font-weight: 600; color: #333;">KDS Access</h2>
    <p style="color: #666; margin-bottom: 40px;">ระบุรหัสผ่านเพื่อเข้าสู่จอครัว</p>
    <form onsubmit="event.preventDefault(); handleLogin();">
      <input type="password" id="passInput" class="login-input" placeholder="••••" autofocus>
      <button type="submit" id="loginBtn" class="action-btn" style="padding:22px; font-size:20px;">ยืนยันรหัสผ่าน</button>
    </form>
  </div>
</div>

<div id="main-app">
  <div class="nav">
    <div class="brand">
      <i class="fas fa-tasks" style="color:var(--primary);"></i> 
      จอครัว (KDS)
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="font-size:11px; color:var(--green); font-weight:600; background:#E8F5E9; padding:5px 12px; border-radius:50px; display:flex; align-items:center; gap:6px;">
        <div style="width:6px; height:6px; background:var(--green); border-radius:50%; animation: blink 1.5s infinite;"></div>
        Sync (3 นาที)
      </div>
      <button onclick="handleLogout()" style="background:none; border:none; color:#AAA; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <div class="container">
    <div class="search-box">
      <i class="fas fa-search" style="color:#BBB; font-size:14px;"></i>
      <input type="text" id="sQuery" class="search-input" placeholder="พิมพ์เลขเพื่อค้นหา (เช่น 4)..." oninput="renderTasks()">
    </div>

    <div id="taskList">
      <div style="text-align:center; padding:50px; color:#AAA;">
        <i class="fas fa-circle-notch fa-spin" style="font-size:30px;"></i>
        <p>Loading...</p>
      </div>
    </div>

    <div class="pagination-footer">
      <select id="pgLimit" class="styled-select" onchange="changePageLimit()">
        <option value="5">โชว์ 5 แถว</option>
        <option value="10">โชว์ 10 แถว</option>
        <option value="15">โชว์ 15 แถว</option>
      </select>
      <button class="page-btn" onclick="prevPage()" id="prevBtn"><i class="fas fa-chevron-left"></i></button> 
      <span id="pageInfo" style="font-weight:600; min-width:60px; text-align:center;">หน้า 1 / 1</span> 
      <button class="page-btn" onclick="nextPage()" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>
</div>

<script>
  let tasks = [], currentPage = 1, pageLimit = 5;
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwiFMRKwx__Gj2tTPgOsd4qe8BXKxgv78P7gMEsL9PejXbHkjRHFrO8kyOXahCbtt81/exec";
  const TOKEN_KEY = "coffee_today_admin_token";

  window.onload = () => {
    const savedToken = localStorage.getItem(TOKEN_KEY);
    if (savedToken) {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      refreshTasks(savedToken);
      setInterval(() => refreshTasks(localStorage.getItem(TOKEN_KEY)), 180000);
    }
  };

  /** ✅ อัปเกรด: ระบบ Login แบบ API */
  function handleLogin() { 
    const lBtn = document.getElementById('loginBtn');
    const pInput = document.getElementById('passInput');
    lBtn.disabled = true; lBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';

    fetch(`${GAS_URL}?action=verifyLogin&pass=${pInput.value}`)
      .then(res => res.json())
      .then(res => {
        if(res.status === 'success'){
          localStorage.setItem(TOKEN_KEY, res.token);
          location.reload();
        } else {
          alert(res.message);
          lBtn.disabled = false; lBtn.innerHTML = 'ยืนยันรหัสผ่าน';
          pInput.value = ''; pInput.focus();
        }
      });
  }

  function handleLogout() { localStorage.removeItem(TOKEN_KEY); location.reload(); }

  /** ✅ อัปเกรด: ดึงข้อมูลผ่าน fetch API */
  function refreshTasks(token) {
    const t = token || localStorage.getItem(TOKEN_KEY);
    fetch(`${GAS_URL}?action=getOrdersByStatus&status=Pending&token=${t}`)
      .then(res => res.json())
      .then(newData => {
        tasks = newData;
        renderTasks();
      });
  }

  function renderTasks() {
    const c = document.getElementById('taskList');
    const query = document.getElementById('sQuery').value.trim().toLowerCase();

    let filteredTasks = tasks.filter(t => {
      if (!query) return true;
      const orderNum = t.id.replace(/\D/g, ''); 
      return t.id.toLowerCase().includes(query) || orderNum.includes(query) || parseInt(orderNum) == parseInt(query);
    });

    if(filteredTasks.length === 0) {
      c.innerHTML = `<div class="empty-state"><i class="fas fa-search" style="font-size:60px; color:#E0E0E0; margin-bottom:15px;"></i><h2 style="color:#CCC; margin:0;">ไม่พบข้อมูล...</h2></div>`;
      document.getElementById('pageInfo').innerText = "หน้า 1 / 1";
      document.getElementById('prevBtn').disabled = true;
      document.getElementById('nextBtn').disabled = true;
      return;
    }
    
    const totalPages = Math.ceil(filteredTasks.length / pageLimit);
    if(currentPage > totalPages) currentPage = totalPages || 1;
    const start = (currentPage - 1) * pageLimit;
    const paginatedTasks = filteredTasks.slice(start, start + pageLimit);

    let h = '';
    paginatedTasks.forEach(t => {
      let itemsArray = t.items.split('\n').filter(line => line.trim() !== "");
      let itemsHtml = itemsArray.map((item, index) => {
        let cleanItem = item.replace(/ \(เหลือ:.*?, สั่ง:(.*?)\)/, ' x <b style="color:var(--primary)">$1</b>');
        return `
          <label class="check-row" id="row-${t.id}-${index}">
            <input type="checkbox" onchange="validateOrder('${t.id}', ${index}, this)" class="check-${t.id}">
            <span>${cleanItem}</span>
          </label>`;
      }).join('');

      h += `
      <div class="task-card">
        <div class="task-header">
          <div>
            <div class="order-id">${t.id}</div>
            <div class="badge-container">
               <div class="branch-badge"><i class="fas fa-store"></i> ${t.branch}</div>
               ${t.phone ? `<a href="tel:${t.phone}" class="phone-badge"><i class="fas fa-phone"></i> ${t.phone}</a>` : ''}
            </div>
          </div>
          <div class="task-time">${t.time}</div>
        </div>
        <div class="item-checklist">${itemsHtml}</div>
        <button class="action-btn" id="btn-${t.id}" disabled onclick="markPacked('${t.id}', this)">
          <i class="fas fa-check-circle"></i> แพ็คของครบแล้ว
        </button>
      </div>`;
    });
    
    c.innerHTML = h;
    document.getElementById('pageInfo').innerText = `หน้า ${currentPage} / ${totalPages}`;
    document.getElementById('prevBtn').disabled = (currentPage === 1);
    document.getElementById('nextBtn').disabled = (currentPage === totalPages);
  }

  function changePageLimit() { pageLimit = parseInt(document.getElementById('pgLimit').value); currentPage = 1; renderTasks(); }
  function nextPage() { currentPage++; renderTasks(); }
  function prevPage() { currentPage--; renderTasks(); }

  function validateOrder(orderId, index, cb) {
    const row = document.getElementById(`row-${orderId}-${index}`);
    if(cb.checked) row.classList.add('checked'); else row.classList.remove('checked');
    const allChecks = document.querySelectorAll(`.check-${orderId}`);
    const checkedCount = document.querySelectorAll(`.check-${orderId}:checked`).length;
    const btn = document.getElementById(`btn-${orderId}`);
    btn.disabled = (checkedCount !== allChecks.length);
  }

  /** ✅ อัปเกรด: บันทึกสถานะผ่าน fetch API */
  function markPacked(id, btn) {
    if(!confirm('ยืนยันออเดอร์ ' + id + ' พร้อมส่ง?')) return;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> บันทึก...';
    btn.disabled = true;
    const token = localStorage.getItem(TOKEN_KEY);
    
    fetch(`${GAS_URL}?action=setOrderStatus&id=${id}&status=Packed&token=${token}`)
      .then(res => res.json())
      .then(res => {
        if(res.status === 'success') refreshTasks(token);
      });
  }
</script>
</body>
</html>
